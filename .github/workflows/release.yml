name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # v0.0.0, v0.1.0, v1.0.0, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.0)'
        required: true
        default: '0.0.0-test'

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for release notes

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.5'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build Vite (renderer + Electron main process)
        run: bun run build

      - name: Package Electron app for Linux
        run: bunx electron-builder --linux --config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        run: ls -la release/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: apiary-linux-amd64
          if-no-files-found: "error"
          path: release/apiary-linux-*

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.5'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build Vite (renderer + Electron main process)
        run: bun run build

      - name: Package Electron app for macOS (${{ matrix.arch }})
        run: bunx electron-builder --mac --${{ matrix.arch }} --config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        run: ls -la release/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: apiary-darwin-${{ matrix.arch }}
          if-no-files-found: "error"
          path: release/apiary-darwin-${{ matrix.arch }}.*

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "version=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            $tag = "${{ github.ref }}"
            $version = $tag -replace 'refs/tags/v', ''
            echo "version=$version" >> $env:GITHUB_OUTPUT
          }

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.5'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build Vite (renderer + Electron main process)
        run: bun run build

      - name: Package Electron app for Windows
        run: bunx electron-builder --win --config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        shell: pwsh
        run: Get-ChildItem -Path release/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: apiary-win-x64
          if-no-files-found: "error"
          path: release/apiary-win-*

  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required for creating releases

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Check artifact existence
        id: check-artifacts
        run: |
          echo "Checking for required artifacts..."

          # Check for Linux artifact
          LINUX_ARTIFACT=$(find artifacts/apiary-linux-amd64 -type f 2>/dev/null | head -1)
          if [[ -n "$LINUX_ARTIFACT" ]]; then
            echo "Linux artifact found: $LINUX_ARTIFACT"
            LINUX_FOUND=true
          else
            echo "Linux artifact NOT found"
            LINUX_FOUND=false
          fi

          # Check for macOS artifacts
          MAC_X64_ARTIFACT=$(find artifacts/apiary-darwin-x64 -type f 2>/dev/null | head -1)
          MAC_ARM64_ARTIFACT=$(find artifacts/apiary-darwin-arm64 -type f 2>/dev/null | head -1)
          if [[ -n "$MAC_X64_ARTIFACT" ]] && [[ -n "$MAC_ARM64_ARTIFACT" ]]; then
            echo "macOS artifacts found"
            MACOS_FOUND=true
          else
            echo "macOS artifacts NOT found"
            MACOS_FOUND=false
          fi

          # Check for Windows artifact
          WIN_ARTIFACT=$(find artifacts/apiary-win-x64 -type f 2>/dev/null | head -1)
          if [[ -f "$WIN_ARTIFACT" ]]; then
            echo "Windows artifact found"
            WINDOWS_FOUND=true
          else
            echo "Windows artifact NOT found"
            WINDOWS_FOUND=false
          fi
          export WINDOWS_FOUND # TODO: unused

          # Require at least Linux and macOS artifacts
          if [[ "$LINUX_FOUND" == "true" ]] && [[ "$MACOS_FOUND" == "true" ]]; then
            echo "Required artifacts present"
            echo "artifacts_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: Missing required artifacts"
            find artifacts -type f 2>/dev/null || true
            echo "artifacts_ok=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: List artifacts
        if: steps.check-artifacts.outputs.artifacts_ok == 'true'
        run: find artifacts -type f

      - name: Extract version for release
        if: steps.check-artifacts.outputs.artifacts_ok == 'true'
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag_name=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: steps.check-artifacts.outputs.artifacts_ok == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.tag_name }}
          generate_release_notes: true
          files: |
            artifacts/**/apiary-*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-test') || contains(steps.version.outputs.version, '-rc') || contains(steps.version.outputs.version, '-beta') || contains(steps.version.outputs.version, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
