<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>apiary</title>
  <link type="text/css" rel="stylesheet" href="/node_modules/golden-layout/dist/css/goldenlayout-base.css" />
  <link type="text/css" rel="stylesheet" href="/node_modules/golden-layout/dist/css/themes/goldenlayout-dark-theme.css" />
  <link rel="stylesheet" href="/node_modules/github-markdown-css/github-markdown.css" />
  <style>
    * {
      padding: 0;
      margin: 0;
      color-scheme: dark;
    }
    body {
      height: 100vh;
      width: 100vw;
    }
    .h100 {
      height: 100%;
    }
    #layoutContainer > .lm_goldenlayout {
      background: transparent;
    }

    html, body, #app {
      font-family: Avenir, Helvetica, Arial, sans-serif;
      /* background: rgb(10, 10, 20); */
      /* color: white; */
      height: 100%;
      max-height: 100%;
      margin: 0;
      --row-even: #020202;
      --row-odd: #101010;
      --row-highlight: #202020;
      --col-highlight: #202020;
    }

    table {
      table-layout: fixed;
      /* border-spacing: 0;
      width: 100%;
      column-width: 50%;
      text-align: left; */
    }
    th:hover {
      background-color: var(--col-highlight) !important; /* NOTE: in order to override inline styles */
    }
    table tr:nth-child(odd) {
      background-color: var(--row-odd);
    }
    table tr:nth-child(even) {
      background-color: var(--row-even);
    }
    td:hover {
      background-color: var(--row-highlight);
    }

    textarea {
      height: 100%;
    }

    .highlight-red {
      color: grey;
    }
    .highlight-red:hover {
      color: #ff0000;
    }

    /* это ебучее гавно не ставит это по дефолту и не дает мне элемент чтобы
       поменять стиль поэтому костыляем это дерьмо так */
    .cm-editor {
      height: 100%;
    }
  </style>
  <style id="dynamic-styles" type="text/css"></style>
</head>
<body>
</body>
<script type="module" src="./renderer.ts"></script>
</html>
